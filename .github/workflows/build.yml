name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# 🌟 必须保留：赋予工作流创建 Release 的权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build APKs
        run: gradle :app:assembleDebug

      # 🌟 核心简化：直接把编译好的 Debug APK 丢进 Release 页面
      # 这样既不需要配置任何 Secrets，编译出来的 APK 还自带默认签名，下载即装！
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "ColorOS Feiniu Bridge 自动编译版 (r${{ github.run_number }})"
          body: |
            这是由 GitHub Actions 自动编译生成的最新版本。
            
            **更新说明：**
            - 现代化重构 `AndroidManifest.xml`
            - 移除旧版 `scope.list`，完美适配新版 LSPosed 作用域
            
            *提示：请下载下方的 `coloros-feiniu-bridge-debug.apk` 安装使用。*
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/debug/*.apk
